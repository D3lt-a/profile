<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link type="image/png" sizes="16x16" rel="icon" href=".../icons8-administrator male-ios7-16.png">
  <title>Admin</title>
  <link
    href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Fraunces:ital,opsz,wght@0,9..144,300;1,9..144,300&display=swap"
    rel="stylesheet" />
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #0f0e0c;
      --bg2: #161410;
      --bg3: #1e1b17;
      --border: rgba(210, 145, 50, 0.14);
      --border2: rgba(210, 145, 50, 0.3);
      --amber: #d49132;
      --amber-d: #8a5e1f;
      --amber-b: #f0b84a;
      --text: #e8ddc8;
      --text-dim: #8a7f6e;
      --text-mut: #4a453c;
      --red: #b05050;
      --red-bg: rgba(176, 80, 80, 0.08);
      --green: #5a9e6f;
      --mono: 'JetBrains Mono', monospace;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--mono);
      font-size: 14px;
      line-height: 1.7;
      min-height: 100vh;
    }

    /* ── LOGIN SCREEN ── */
    #login-screen {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .login-box {
      width: 100%;
      max-width: 380px;
      border: 1px solid var(--border2);
      background: var(--bg2);
      padding: 2.5rem;
      border-radius: 2px;
    }

    .login-logo {
      font-size: 11px;
      color: var(--amber);
      letter-spacing: 0.15em;
      margin-bottom: 2rem;
    }

    .login-title {
      font-size: 1.5rem;
      font-weight: 300;
      color: var(--text);
      margin-bottom: 0.4rem;
    }

    .login-sub {
      font-size: 12px;
      color: var(--text-dim);
      margin-bottom: 2rem;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-bottom: 1.2rem;
    }

    .field label {
      font-size: 11px;
      color: var(--text-mut);
      letter-spacing: 0.14em;
      text-transform: uppercase;
    }

    .field input,
    .field textarea,
    .field select {
      background: var(--bg3);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: var(--mono);
      font-size: 13px;
      padding: 9px 12px;
      border-radius: 2px;
      outline: none;
      transition: border-color 0.18s;
      width: 100%;
    }

    .field input:focus,
    .field textarea:focus {
      border-color: var(--amber-d);
    }

    .field textarea {
      resize: vertical;
      min-height: 90px;
    }

    .btn-full {
      width: 100%;
      padding: 10px;
      font-family: var(--mono);
      font-size: 13px;
      font-weight: 700;
      background: var(--amber);
      color: #0f0e0c;
      border: 1px solid var(--amber);
      cursor: pointer;
      border-radius: 2px;
      letter-spacing: 0.06em;
      transition: all 0.18s;
    }

    .btn-full:hover {
      background: var(--amber-b);
      border-color: var(--amber-b);
    }

    .login-error {
      font-size: 12px;
      color: var(--red);
      margin-top: 1rem;
      display: none;
    }

    /* ── ADMIN LAYOUT ── */
    #admin-screen {
      display: none;
    }

    header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(15, 14, 12, 0.93);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid var(--border);
      padding: 0 2.5rem;
      height: 54px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 1.5rem;
    }

    .header-logo {
      font-size: 12px;
      color: var(--amber);
      letter-spacing: 0.1em;
    }

    .header-badge {
      font-size: 10px;
      background: rgba(212, 145, 50, 0.1);
      color: var(--amber-d);
      border: 1px solid var(--border);
      padding: 2px 10px;
      border-radius: 2px;
    }

    .header-right {
      display: flex;
      gap: 1rem;
      align-items: center;
    }

    .btn-sm {
      font-family: var(--mono);
      font-size: 11px;
      padding: 6px 14px;
      border-radius: 2px;
      cursor: pointer;
      letter-spacing: 0.05em;
      transition: all 0.18s;
      text-decoration: none;
      display: inline-block;
    }

    .btn-outline {
      background: transparent;
      color: var(--text-dim);
      border: 1px solid var(--border2);
    }

    .btn-outline:hover {
      color: var(--text);
      border-color: var(--amber-d);
    }

    .btn-danger-sm {
      background: transparent;
      color: var(--red);
      border: 1px solid rgba(176, 80, 80, 0.25);
    }

    .btn-danger-sm:hover {
      background: var(--red-bg);
    }

    /* ── MAIN ── */
    main {
      max-width: 960px;
      margin: 0 auto;
      padding: 3rem 2.5rem;
    }

    .page-title {
      font-size: 1.1rem;
      font-weight: 500;
      color: var(--text);
      margin-bottom: 0.3rem;
    }

    .page-sub {
      font-size: 12px;
      color: var(--text-dim);
      margin-bottom: 2.5rem;
    }

    /* ── ADD FORM PANEL ── */
    .panel {
      border: 1px solid var(--border);
      background: var(--bg2);
      border-radius: 2px;
      margin-bottom: 2.5rem;
      overflow: hidden;
    }

    .panel-header {
      padding: 0.9rem 1.5rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .panel-title {
      font-size: 12px;
      color: var(--amber);
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    .toggle-btn {
      font-family: var(--mono);
      font-size: 11px;
      background: none;
      border: none;
      color: var(--text-dim);
      cursor: pointer;
      letter-spacing: 0.05em;
      transition: color 0.18s;
    }

    .toggle-btn:hover {
      color: var(--amber);
    }

    .panel-body {
      padding: 1.75rem;
    }

    .panel-body.hidden {
      display: none;
    }

    .field-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
    }

    .form-actions {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      padding-top: 0.5rem;
    }

    .btn-cancel-form {
      font-family: var(--mono);
      font-size: 12px;
      background: none;
      border: 1px solid var(--border);
      color: var(--text-mut);
      padding: 8px 18px;
      cursor: pointer;
      border-radius: 2px;
      transition: all 0.18s;
    }

    .btn-cancel-form:hover {
      color: var(--text-dim);
      border-color: var(--border2);
    }

    .btn-save {
      font-family: var(--mono);
      font-size: 12px;
      background: var(--amber);
      border: 1px solid var(--amber);
      color: #0f0e0c;
      font-weight: 700;
      padding: 8px 22px;
      cursor: pointer;
      border-radius: 2px;
      letter-spacing: 0.04em;
      transition: all 0.18s;
    }

    .btn-save:hover {
      background: var(--amber-b);
      border-color: var(--amber-b);
    }

    /* ── PROJECT TABLE ── */
    .table-wrap {
      border: 1px solid var(--border);
      border-radius: 2px;
      overflow: hidden;
    }

    .table-header {
      display: grid;
      grid-template-columns: 1fr 2fr 1fr auto;
      padding: 0.7rem 1.25rem;
      background: var(--bg3);
      border-bottom: 1px solid var(--border);
      font-size: 11px;
      color: var(--text-mut);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      gap: 1rem;
    }

    .proj-row {
      display: grid;
      grid-template-columns: 1fr 2fr 1fr auto;
      padding: 1rem 1.25rem;
      border-bottom: 1px solid var(--border);
      gap: 1rem;
      align-items: start;
      transition: background 0.15s;
    }

    .proj-row:last-child {
      border-bottom: none;
    }

    .proj-row:hover {
      background: var(--bg3);
    }

    .proj-row-name {
      font-size: 13px;
      font-weight: 500;
      color: var(--text);
    }

    .proj-row-desc {
      font-size: 12px;
      color: var(--text-dim);
      line-height: 1.6;
    }

    .proj-row-tech {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
    }

    .proj-row-tech span {
      font-size: 10px;
      padding: 1px 7px;
      border-radius: 2px;
      background: rgba(212, 145, 50, 0.07);
      color: var(--amber-d);
      border: 1px solid rgba(212, 145, 50, 0.14);
    }

    .proj-row-actions {
      display: flex;
      gap: 6px;
    }

    .btn-edit {
      font-family: var(--mono);
      font-size: 10.5px;
      background: none;
      border: 1px solid var(--border);
      color: var(--text-dim);
      padding: 4px 12px;
      cursor: pointer;
      border-radius: 2px;
      transition: all 0.18s;
    }

    .btn-edit:hover {
      color: var(--amber);
      border-color: var(--amber-d);
    }

    .btn-del {
      font-family: var(--mono);
      font-size: 10.5px;
      background: none;
      border: 1px solid rgba(176, 80, 80, 0.2);
      color: var(--red);
      padding: 4px 12px;
      cursor: pointer;
      border-radius: 2px;
      transition: all 0.18s;
    }

    .btn-del:hover {
      background: var(--red-bg);
      border-color: var(--red);
    }

    .tbl-empty {
      padding: 2.5rem;
      text-align: center;
      color: var(--text-mut);
      font-size: 12px;
    }

    .tbl-empty span {
      color: var(--amber-d);
    }

    .tbl-loading {
      padding: 2rem;
      text-align: center;
      color: var(--text-mut);
      font-size: 12px;
    }

    /* ── TOAST ── */
    .toast {
      position: fixed;
      bottom: 2rem;
      right: 2rem;
      z-index: 999;
      background: var(--bg3);
      border: 1px solid var(--amber-d);
      color: var(--amber);
      font-size: 12px;
      padding: 10px 18px;
      border-radius: 2px;
      letter-spacing: 0.05em;
      opacity: 0;
      transform: translateY(8px);
      transition: all 0.28s;
      pointer-events: none;
    }

    .toast.show {
      opacity: 1;
      transform: translateY(0);
    }

    .toast.error {
      border-color: var(--red);
      color: var(--red);
    }

    /* ── MODAL (edit) ── */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(10, 9, 8, 0.85);
      z-index: 500;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s;
    }

    .modal-overlay.open {
      opacity: 1;
      pointer-events: all;
    }

    .modal {
      background: var(--bg2);
      border: 1px solid var(--border2);
      border-radius: 2px;
      width: 100%;
      max-width: 560px;
      max-height: 90vh;
      overflow-y: auto;
    }

    .modal-header {
      padding: 1.1rem 1.5rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .modal-title {
      font-size: 12px;
      color: var(--amber);
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    .modal-close {
      font-family: var(--mono);
      background: none;
      border: none;
      color: var(--text-dim);
      font-size: 16px;
      cursor: pointer;
      line-height: 1;
      transition: color 0.18s;
      padding: 0 4px;
    }

    .modal-close:hover {
      color: var(--amber);
    }

    .modal-body {
      padding: 1.75rem;
    }

    .modal-actions {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      margin-top: 1.5rem;
    }

    @media (max-width: 640px) {
      header {
        padding: 0 1.25rem;
      }

      main {
        padding: 2rem 1.25rem;
      }

      .field-row {
        grid-template-columns: 1fr;
      }

      .table-header,
      .proj-row {
        grid-template-columns: 1fr auto;
      }

      .table-header .col-desc,
      .table-header .col-tech,
      .proj-row-desc,
      .proj-row-tech {
        display: none;
      }
    }
  </style>
</head>

<body>

  <!-- ══════════════ LOGIN ══════════════ -->
  <div id="login-screen">
    <div class="login-box">
      <p class="login-logo">// admin access</p>
      <h1 class="login-title">Sign in</h1>
      <p class="login-sub">Portfolio management panel</p>
      <div class="field">
        <label>Password</label>
        <input type="password" id="pwd-input" placeholder="Enter your password" autocomplete="current-password" />
      </div>
      <button class="btn-full" onclick="login()">enter →</button>
      <p class="login-error" id="login-error">// incorrect password</p>
    </div>
  </div>



  <!-- ══════════════ ADMIN ══════════════ -->
  <div id="admin-screen">

    <header>
      <div class="header-left">
        <span class="header-logo">// dev.folio</span>
        <span class="header-badge">admin</span>
      </div>
      <div class="header-right">
        <a href="index.html" class="btn-sm btn-outline" target="_blank">view site ↗</a>
        <button class="btn-sm btn-danger-sm" onclick="logout()">logout</button>
      </div>
    </header>

    <main>
      <h1 class="page-title">Projects</h1>
      <p class="page-sub">Add, edit or remove projects. Changes reflect on the public portfolio instantly.</p>

      <!-- ADD FORM -->
      <div class="panel">
        <div class="panel-header">
          <span class="panel-title">+ new project</span>
          <button class="toggle-btn" id="toggle-btn" onclick="toggleForm()">[ expand ]</button>
        </div>
        <div class="panel-body hidden" id="form-body">
          <div class="field">
            <label>Project Name</label>
            <input type="text" id="f-name" placeholder="e.g. TaskFlow API" />
          </div>
          <div class="field">
            <label>Description</label>
            <textarea id="f-desc" placeholder="What does it do? What problem does it solve?"></textarea>
          </div>
          <div class="field-row">
            <div class="field">
              <label>GitHub URL</label>
              <input type="url" id="f-github" placeholder="https://github.com/you/repo" />
            </div>
            <div class="field">
              <label>Live URL <span
                  style="color:var(--text-mut);text-transform:none;letter-spacing:0">(optional)</span></label>
              <input type="url" id="f-live" placeholder="https://yourapp.com" />
            </div>
          </div>
          <div class="field">
            <label>Tech Stack <span
                style="color:var(--text-mut);text-transform:none;letter-spacing:0">(comma-separated)</span></label>
            <input type="text" id="f-tech" placeholder="React, Node.js, PostgreSQL" />
          </div>
          <div class="form-actions">
            <button class="btn-cancel-form" onclick="resetForm()">cancel</button>
            <button class="btn-save" onclick="addProject()">post project →</button>
          </div>
        </div>
      </div>

      <!-- TABLE -->
      <div class="table-wrap" id="table-wrap">
        <div class="tbl-loading">// loading projects...</div>
      </div>
    </main>

  </div>

  <!-- EDIT MODAL -->
  <div class="modal-overlay" id="modal-overlay" onclick="closeModal(event)">
    <div class="modal">
      <div class="modal-header">
        <span class="modal-title">edit project</span>
        <button class="modal-close" onclick="closeModal()">✕</button>
      </div>
      <div class="modal-body">
        <input type="hidden" id="e-id" />
        <div class="field">
          <label>Project Name</label>
          <input type="text" id="e-name" />
        </div>
        <div class="field">
          <label>Description</label>
          <textarea id="e-desc"></textarea>
        </div>
        <div class="field-row">
          <div class="field">
            <label>GitHub URL</label>
            <input type="url" id="e-github" />
          </div>
          <div class="field">
            <label>Live URL</label>
            <input type="url" id="e-live" />
          </div>
        </div>
        <div class="field">
          <label>Tech Stack <span
              style="color:var(--text-mut);text-transform:none;letter-spacing:0">(comma-separated)</span></label>
          <input type="text" id="e-tech" />
        </div>
        <div class="modal-actions">
          <button class="btn-cancel-form" onclick="closeModal()">cancel</button>
          <button class="btn-save" onclick="saveEdit()">save changes →</button>
        </div>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    /* ════════════════════════════════════════
       CONFIG — swap these when backend is ready
       ════════════════════════════════════════ */
    const API_BASE = 'https://dashboard-nhfa.onrender.com/api';

    /*
      Expected API contract:
      GET    /api/projects              → [ { id, name, description, tech[], github_url, live_url, created_at } ]
      POST   /api/projects              → body: { name, description, tech[], github_url, live_url }  → 201 created project
      PUT    /api/projects/:id          → body: { name, description, tech[], github_url, live_url }  → updated project
      DELETE /api/projects/:id          → 204 no content
    
      POST   /api/auth/login            → body: { password }  → 200 { token } | 401
      (Token stored in sessionStorage and sent as  Authorization: Bearer <token>)
    */

    /* ════ AUTH ════ */
    function getToken() { return sessionStorage.getItem('admin_token'); }
    function setToken(t) { sessionStorage.setItem('admin_token', t); }
    function clearToken() { sessionStorage.removeItem('admin_token'); }

    function authHeaders() {
      return { 'Content-Type': 'application/json', 'Authorization': `Bearer ${getToken()}` };
    }

    async function login() {
      const pwd = document.getElementById('pwd-input').value;
      if (!pwd) return;
      try {
        const res = await fetch(`${API_BASE}/auth/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ password: pwd })
        });
        if (!res.ok) throw new Error('bad credentials');
        const data = await res.json();
        setToken(data.token);
        showAdmin();
      } catch {
        // ── DEMO MODE: accept 'admin' as password when no backend ──
        if (pwd === 'admin') {
          setToken('demo-token');
          showAdmin();
        } else {
          document.getElementById('login-error').style.display = 'block';
        }
      }
    }

    document.getElementById('pwd-input').addEventListener('keydown', e => {
      if (e.key === 'Enter') login();
    });

    function logout() {
      clearToken();
      document.getElementById('admin-screen').style.display = 'none';
      document.getElementById('login-screen').style.display = 'flex';
      document.getElementById('pwd-input').value = '';
      document.getElementById('login-error').style.display = 'none';
    }

    function showAdmin() {
      document.getElementById('login-screen').style.display = 'none';
      document.getElementById('admin-screen').style.display = 'block';
      loadProjects();
    }

    /* check for existing session */
    if (getToken()) showAdmin();

    /* ════ PROJECTS ════ */
    let projects = [];

    async function loadProjects() {
      const wrap = document.getElementById('table-wrap');
      wrap.innerHTML = '<div class="tbl-loading">// loading projects...</div>';
      try {
        const res = await fetch(`${API_BASE}/projects`, { headers: authHeaders() });
        if (!res.ok) throw new Error();
        projects = await res.json();
      } catch {
        projects = DEMO_PROJECTS; // demo fallback
      }
      renderTable();
    }

    function renderTable() {
      const wrap = document.getElementById('table-wrap');
      if (!projects.length) {
        wrap.innerHTML = '<div class="tbl-empty">No projects yet. <span>Add your first one above ↑</span></div>';
        return;
      }
      wrap.innerHTML = `
    <div class="table-header">
      <span>Name</span>
      <span class="col-desc">Description</span>
      <span class="col-tech">Stack</span>
      <span>Actions</span>
    </div>
    ${projects.map(p => `
      <div class="proj-row">
        <div>
          <p class="proj-row-name">${esc(p.name)}</p>
          ${p.github_url ? `<a href="${esc(p.github_url)}" target="_blank" style="font-size:10.5px;color:var(--amber-d);text-decoration:none;">github ↗</a>` : ''}
          ${p.live_url ? ` &nbsp;<a href="${esc(p.live_url)}" target="_blank" style="font-size:10.5px;color:var(--amber-d);text-decoration:none;">live ↗</a>` : ''}
        </div>
        <p class="proj-row-desc col-desc">${esc(p.description)}</p>
        <div class="proj-row-tech col-tech">${(p.tech || []).map(t => `<span>${esc(t)}</span>`).join('')}</div>
        <div class="proj-row-actions">
          <button class="btn-edit" onclick="openEdit('${esc(p.id)}')">edit</button>
          <button class="btn-del"  onclick="deleteProject('${esc(p.id)}')">delete</button>
        </div>
      </div>
    `).join('')}
  `;
    }

    /* ── ADD ── */
    let formOpen = false;
    function toggleForm() {
      formOpen = !formOpen;
      document.getElementById('form-body').classList.toggle('hidden', !formOpen);
      document.getElementById('toggle-btn').textContent = formOpen ? '[ collapse ]' : '[ expand ]';
    }
    function resetForm() {
      ['f-name', 'f-desc', 'f-github', 'f-live', 'f-tech'].forEach(id => document.getElementById(id).value = '');
      if (formOpen) toggleForm();
    }

    async function addProject() {
      const name = document.getElementById('f-name').value.trim();
      const description = document.getElementById('f-desc').value.trim();
      if (!name || !description) { showToast('name & description required', true); return; }
      const payload = {
        name, description,
        github_url: document.getElementById('f-github').value.trim(),
        live_url: document.getElementById('f-live').value.trim(),
        tech: document.getElementById('f-tech').value.split(',').map(t => t.trim()).filter(Boolean)
      };
      try {
        const res = await fetch(`${API_BASE}/projects`, {
          method: 'POST', headers: authHeaders(), body: JSON.stringify(payload)
        });
        if (!res.ok) throw new Error();
        const created = await res.json();
        projects.unshift(created);
      } catch {
        // demo: add locally
        payload.id = 'demo-' + Date.now();
        projects.unshift(payload);
      }
      renderTable();
      resetForm();
      showToast('project posted ✓');
    }

    /* ── EDIT ── */
    function openEdit(id) {
      const p = projects.find(x => String(x.id) === String(id));
      if (!p) return;
      document.getElementById('e-id').value = p.id;
      document.getElementById('e-name').value = p.name;
      document.getElementById('e-desc').value = p.description;
      document.getElementById('e-github').value = p.github_url || '';
      document.getElementById('e-live').value = p.live_url || '';
      document.getElementById('e-tech').value = (p.tech || []).join(', ');
      document.getElementById('modal-overlay').classList.add('open');
    }
    function closeModal(e) {
      if (!e || e.target === document.getElementById('modal-overlay'))
        document.getElementById('modal-overlay').classList.remove('open');
    }
    async function saveEdit() {
      const id = document.getElementById('e-id').value;
      const payload = {
        name: document.getElementById('e-name').value.trim(),
        description: document.getElementById('e-desc').value.trim(),
        github_url: document.getElementById('e-github').value.trim(),
        live_url: document.getElementById('e-live').value.trim(),
        tech: document.getElementById('e-tech').value.split(',').map(t => t.trim()).filter(Boolean)
      };
      if (!payload.name || !payload.description) { showToast('name & description required', true); return; }
      try {
        const res = await fetch(`${API_BASE}/projects/${id}`, {
          method: 'PUT', headers: authHeaders(), body: JSON.stringify(payload)
        });
        if (!res.ok) throw new Error();
        const updated = await res.json();
        const idx = projects.findIndex(x => String(x.id) === String(id));
        if (idx > -1) projects[idx] = updated;
      } catch {
        const idx = projects.findIndex(x => String(x.id) === String(id));
        if (idx > -1) projects[idx] = { ...projects[idx], ...payload };
      }
      renderTable();
      closeModal();
      showToast('project updated ✓');
    }

    /* ── DELETE ── */
    async function deleteProject(id) {
      if (!confirm('Delete this project? This cannot be undone.')) return;
      try {
        await fetch(`${API_BASE}/projects/${id}`, { method: 'DELETE', headers: authHeaders() });
      } catch { /* demo: delete locally */ }
      projects = projects.filter(x => String(x.id) !== String(id));
      renderTable();
      showToast('project deleted');
    }

    /* ── UTILS ── */
    function showToast(msg, isErr = false) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.className = 'toast show' + (isErr ? ' error' : '');
      setTimeout(() => t.className = 'toast', 2800);
    }
    function esc(str = '') {
      return String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    const DEMO_PROJECTS = [
      { id: 'demo-1', name: 'Demo Project', description: 'This is demo data — connect your backend to see real projects.', tech: ['React', 'Node.js'], github_url: '#', live_url: '' },
    ];
  </script>
</body>
